name: RedQueen
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

packages:
  MatrixRustSDK:
    url: https://github.com/matrix-org/matrix-rust-components-swift
    exactVersion: 26.06.06

settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: QKGXKAB6MT

targets:
  RedQueen:
    type: application
    platform: iOS
    sources:
      - RedQueen
    entitlements:
      path: RedQueen/RedQueen.entitlements
      properties:
        # Lets iOS password managers offer credentials saved for the
        # homeserver domain on the login screen. Requires the matching
        # apple-app-site-association file on the server. Exactly this host —
        # a bare-domain entry widens matching to sibling subdomains (gitlab…).
        com.apple.developer.associated-domains:
          - webcredentials:matrix.roesrath-kleineichen.de
        # Dev builds use the APNs sandbox; distribution signing rewrites
        # this to "production".
        aps-environment: development
    dependencies:
      - package: MatrixRustSDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: info.pich.redqueen
        PRODUCT_NAME: RedQueen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Red Queen uses the microphone for voice calls with the agent."
        INFOPLIST_KEY_NSCameraUsageDescription: "Red Queen uses the camera for video calls."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: YES

  RedQueenTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RedQueenTests
    dependencies:
      - target: RedQueen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: info.pich.redqueen.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  RedQueen:
    build:
      targets:
        RedQueen: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RedQueenTests
